<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link href="../../../output.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    
    <title>Document</title>
</head>
<body class="text-(--electric-blue) h-full">
    <div class="w-screen h-screen flex items-center justify-center relative">
        <div id="logo" class="absolute cursor-default tracking-neg font-medium text-[18vh] inter-medium tracking-tight">
            The Conduit
        </div>
        <div id="menu" class="absolute w-full flex flex-col items-center opacity-0 pointer-events-none leading-none">
            <div class="w-full text-center font-normal pb-7 text-9xl cursor-pointer tracking-neg transition-colors duration-150 inter-normal hover:bg-(--electric-blue) hover:text-white">explore</div>
            <div class="w-full text-center font-normal pb-7 text-9xl cursor-pointer tracking-neg transition-colors duration-150 inter-normal hover:bg-(--electric-blue) hover:text-white" onclick="window.location.href='registrationForm.php'">register</div>
            <div class="w-full text-center font-normal pb-7 text-9xl cursor-pointer tracking-neg transition-colors duration-150 inter-normal hover:bg-(--electric-blue) hover:text-white" onclick="window.location.href='loginForm.html'">login</div>
        </div>
    </div>
</body>
</html>

<style>
    :root {
        --electric-blue: #0b06ff;
    }

   .inter-medium {
        font-family: "Inter", sans-serif;
        font-optical-sizing: auto;
        font-weight: 500;
        font-style: normal;
    }
    .inter-bold {
        font-family: "Inter", sans-serif;
        font-optical-sizing: auto;
        font-weight: 800;
        font-style: bold;
    }
    .inter-normal {
        font-family: "Inter", sans-serif;
        font-optical-sizing: auto;
        font-weight: 300;
        font-style: normal;
    }
</style>

<script>
    const logo = document.getElementById('logo');
    const menu = document.getElementById('menu');
    const menuItems = document.querySelectorAll('.menu-item');

    let isMenuVisible = false;
    let hideTimeout = null;

    // Initial animation
    gsap.from(logo, {
      opacity: 0,
      y: 20,
      duration: 1,
      ease: 'power3.out',
      delay: 0.7
    });

    function showMenu() {
      if (hideTimeout) { clearTimeout(hideTimeout); hideTimeout = null; }
      if (isMenuVisible) return;
      isMenuVisible = true;

      logo.style.visibility = 'hidden';
      logo.style.pointerEvents = 'none';
      menu.style.visibility = 'visible';
      menu.style.pointerEvents = 'auto';
      gsap.set(menu, { opacity: 1 });
    }

    function hideMenu() {
      if (!isMenuVisible) return;
      isMenuVisible = false;

      menu.style.visibility = 'hidden';
      menu.style.pointerEvents = 'none';
      logo.style.visibility = 'visible';
      logo.style.pointerEvents = 'auto';
    }

    // Hover on logo -> show menu
    logo.addEventListener('mouseenter', showMenu);

    // Leave menu area -> hide menu
    menu.addEventListener('mouseleave', (e) => {
      hideTimeout = setTimeout(hideMenu, 80);
    });

    menu.addEventListener('mouseenter', () => {
      if (hideTimeout) { clearTimeout(hideTimeout); hideTimeout = null; }
    });
  </script>
